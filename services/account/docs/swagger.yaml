basePath: /api/v1
definitions:
  github_com_Eucastan_eucastanpay_services_account_internal_dto_request.CreateAccountRequest:
    properties:
      account_type:
        enum:
        - current
        - fixed_deposit
        - savings
        type: string
      currency:
        enum:
        - NGN
        - USD
        - EURO
        type: string
    required:
    - account_type
    - currency
    type: object
  github_com_Eucastan_eucastanpay_services_account_internal_dto_request.DepositRequest:
    properties:
      account_no:
        type: integer
      amount:
        type: integer
      currency:
        type: string
    required:
    - account_no
    - amount
    type: object
  github_com_Eucastan_eucastanpay_services_account_internal_dto_response.AccountResponse:
    properties:
      account_no:
        type: integer
      account_type:
        type: string
      amount:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      email:
        type: string
      id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_Eucastan_eucastanpay_services_account_internal_dto_response.MessageResponse:
    properties:
      message:
        type: string
    type: object
host: eucastanpay.onrender.com
info:
  contact:
    email: support@eucastanpay.com
    name: Eucastan
  description: Authentication and Account Management Service for EucastanPay.
  license:
    name: MIT
  title: EucastanPay Account Service API
  version: "1.0"
paths:
  /account:
    post:
      consumes:
      - application/json
      description: Creates a new EucastanPay account.
      parameters:
      - description: Account Creation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_request.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.AccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "409":
          description: Account already exists
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Account creation for a new user
      tags:
      - Account
  /account/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.AccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Account Details with accountID and userID
      tags:
      - Account
  /account/{id}/balance:
    get:
      consumes:
      - application/json
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.AccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Account owner's balance
      tags:
      - Account
  /account/{id}/pay-in:
    put:
      consumes:
      - application/json
      parameters:
      - description: Deposit information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_request.DepositRequest'
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Pay into owner's account
      tags:
      - Account
  /account/{id}/withdraw:
    put:
      consumes:
      - application/json
      parameters:
      - description: Deposit information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_request.DepositRequest'
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "409":
          description: Insufficient balance
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_account_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Withdrawing Cash from account
      tags:
      - Account
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

basePath: /api/v1
definitions:
  github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.AccountBalanceResponse:
    properties:
      account_id:
        type: string
      balance:
        type: integer
    type: object
  github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.LedgerResponse:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      balance_after:
        type: integer
      created_at:
        type: string
      description:
        type: string
      entry_type:
        type: string
      id:
        type: string
      reference:
        type: string
      updated_at:
        type: string
    type: object
  github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ReconciliationResult:
    properties:
      account_balance:
        type: integer
      account_id:
        type: string
      difference:
        type: integer
      ledger_balance:
        type: integer
      reason:
        type: string
      reconciled_at:
        type: string
      status:
        description: '"ok" or "discrepancy"'
        type: string
    type: object
  github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ReconciliationResultResponse:
    properties:
      data:
        $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ReconciliationResult'
    type: object
host: localhost:8003
info:
  contact:
    email: support@eucastanpay.com
    name: Eucastan
  description: Authentication and Ledger Entry Service for EucastanPay.
  license:
    name: MIT
  title: EucastanPay Ledger Service API
  version: "1.0"
paths:
  /accounts/{account_id}/balance:
    get:
      consumes:
      - application/json
      description: Get Account Balance from Ledger
      parameters:
      - description: Ledger Account ID
        in: path
        name: account_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.AccountBalanceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Account Balance
      tags:
      - Ledger
  /accounts/{account_id}/reconcile:
    get:
      consumes:
      - application/json
      parameters:
      - description: Ledger Account ID
        in: path
        name: account_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ReconciliationResultResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Reconciliation Result
      tags:
      - Ledger
  /ledgers:
    get:
      consumes:
      - application/json
      parameters:
      - description: Entry Type
        enum:
        - credit
        - debit
        in: query
        name: entry_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.LedgerResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get All Ledger Entries
      tags:
      - Ledger
  /ledgers/{id}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Ledger ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.LedgerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_Eucastan_eucastanpay_services_ledger_internal_dto_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Ledger by ID
      tags:
      - Ledger
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer <JWT>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

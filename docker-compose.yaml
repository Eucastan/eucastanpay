services:
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucastanpay

  postgres-account:
    image: postgres:16-alpine
    container_name: postgres-account
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: account_db
    ports:
      - "5434:5432"
    volumes:
      - account_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucastanpay

  postgres-transfer:
    image: postgres:16-alpine
    container_name: postgres-transfer
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transfer_db
    ports:
      - "5435:5432"
    volumes:
      - transfer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucastanpay

  postgres-ledger:
    image: postgres:16-alpine
    container_name: postgres-ledger
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger_db
    ports:
      - "5436:5432"
    volumes:
      - ledger_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucastanpay

  postgres-audit:
    image: postgres:16-alpine
    container_name: postgres-audit
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audit_db
    ports:
      - "5437:5432"
    volumes:
      - audit_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucastanpay

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notification_db
    ports:
      - "5438:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucastanpay

  redis:
    image: redis:7-alpine
    container_name: eucastanpay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eucastanpay

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eucastanpay-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - eucastanpay

  user:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: user 
    restart: unless-stopped
    ports:
      - "8001:8001"
      - "50051:50051"
    env_file:
      - ./services/user/.env
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
    - eucastanpay

  account:
    build:
      context: .
      dockerfile: services/account/Dockerfile
    container_name: account
    restart: unless-stopped
    ports:
      - "8002:8002"
      - "50052:50052"
    env_file:
      - ./services/account/.env
    depends_on:
      postgres-account:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
    - eucastanpay

  transfer:
    build:
      context: .
      dockerfile: services/transfer/Dockerfile
    container_name: transfer
    restart: unless-stopped
    ports:
      - "8004:8004"
      - "50054:50054"
    env_file:
      - ./services/transfer/.env
    depends_on:
      postgres-transfer:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
    - eucastanpay

  ledger:
    build:
      context: .
      dockerfile: services/ledger/Dockerfile
    container_name: ledger
    restart: unless-stopped
    ports:
      - "8003:8003"
      - "50053:50053"
    env_file:
      - ./services/ledger/.env
    depends_on:
      postgres-ledger:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
    - eucastanpay

  audit:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    container_name: audit
    restart: unless-stopped
    ports:
      - "8006:8006"
    env_file:
      - ./services/audit/.env
    depends_on:
      postgres-audit:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
    - eucastanpay

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    container_name: notification
    restart: unless-stopped
    ports:
      - "8007:8007"
    env_file:
      - ./services/notification/.env
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8007/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
    - eucastanpay

volumes:
  user_db_data:
  account_db_data:
  transfer_db_data:
  ledger_db_data:
  audit_db_data:
  notification_db_data:
  redis_data:

networks:
  eucastanpay:
    driver: bridge
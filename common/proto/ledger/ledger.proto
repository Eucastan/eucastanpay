syntax = "proto3";

package ledger;

option go_package = "github.com/Eucastan/eucastanpay/common/proto/ledger";

import "google/protobuf/timestamp.proto";

service LedgerService {
    rpc ReconcileAccount(ReconcileAccountRequest) returns (ReconcileResponse);
	rpc GetLedgerBalance(LedgerBalanceRequest) returns (LedgerBalanceResponse);
	rpc GetAllLedgers(ListLedgersRequest) returns (ListLedgersResponse);
	rpc GetLedgersByEntryType(ListLedgersEntryTypeRequest) returns (ListLedgersEntryTypeResponse);
	rpc GetLedger(LedgerRequest) returns (LedgerResponse);
	rpc GetLedgerByUserId(UserIdRequest) returns (LedgerResponse);
	rpc GetLedgerByAccountId(LedgerByAccountIdRequest) returns (LedgerResponse);
}

message ReconcileAccountRequest {
	string account_id = 1;
}

message ReconcileResponse {
	string status = 1;
	string account_id = 2;
	int64 account_balance = 3;
	int64 ledger_balance = 4;
	int64 difference = 5;
	string message = 6;
	google.protobuf.Timestamp reconciled_at = 7;
}

message LedgerBalanceRequest {
	string account_id = 1;
}

message LedgerBalanceResponse{
	int64 balance = 1;
}

message Ledger {
	string ledger_id = 1;
	string user_id = 2;
	string account_id = 3;
	int64 amount = 4;
	string entry_type = 5;
	string reference = 6;
	int64 balance_after = 7;
	string description = 8;
	google.protobuf.Timestamp created_at = 9;
	google.protobuf.Timestamp updated_at = 10;
}

message ListLedgersRequest {
	int32 page = 1;
	int32 limit = 2;
}

message ListLedgersResponse {
	repeated Ledger ledgers = 1;
}

message ListLedgersEntryTypeRequest {
	string entry_type = 1;
}

message ListLedgersEntryTypeResponse {
	repeated Ledger ledgers = 1;
}

message LedgerRequest {
	string ledger_id = 1;
}

message UserIdRequest {
	string user_id = 1;
}

message LedgerByAccountIdRequest {
	string account_id = 1;
}

message LedgerResponse {
    string ledger_id = 1;
	string user_id = 2;
	string account_id = 3;
	int64 amount = 4;
	string entry_type = 5;
	string reference = 6;
	int64 balance_after = 7;
	string description = 8;
	google.protobuf.Timestamp created_at = 9;
	google.protobuf.Timestamp updated_at = 10;
}

syntax = "proto3";

package ledger;

option go_package = "github.com/Eucastan/eucastanpay/common/proto/ledger";

import "google/protobuf/timestamp.proto";

service LedgerService {
    rpc ReconcileAccount(ReconcileAccountRequest) returns (ReconcileResponse);
	rpc GetAllLedgers(ListLedgersRequest) returns (ListLedgersResponse);
	rpc GetLedgersByEntryType(ListLedgersEntryTypeRequest) returns (ListLedgersEntryTypeResponse);
	rpc GetLedger(LedgerRequest) returns (LedgerResponse);
}

message ReconcileAccountRequest {
	string account_id = 1;
}

message ReconcileResponse {
	string status = 1;
	int64 difference = 2;
	string message = 3;
}

message Ledger {
	string ledger_id = 1;
	string account_id = 2;
	int64 amount = 3;
	string entry_type = 4;
	string reference = 5;
	int64 balance_after = 6;
	string description = 7;
	google.protobuf.Timestamp created_at = 8;
	google.protobuf.Timestamp updated_at = 9;
}

message ListLedgersRequest {
	int32 page = 1;
	int32 limit = 2;
}

message ListLedgersResponse {
	repeated Ledger ledgers = 1;
}

message ListLedgersEntryTypeRequest {
	string entry_type = 1;
}

message ListLedgersEntryTypeResponse {
	repeated Ledger ledgers = 1;
}

message LedgerRequest {
	string account_id = 1;
}

message LedgerResponse {
    string ledger_id = 1;
	string account_id = 2;
	int64 amount = 3;
	string entry_type = 4;
	string reference = 5;
	int64 balance_after = 6;
	string description = 7;
	google.protobuf.Timestamp created_at = 8;
	google.protobuf.Timestamp updated_at = 9;
}

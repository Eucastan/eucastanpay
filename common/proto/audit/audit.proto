syntax = "proto3";

package audit;

option go_package = "github.com/Eucastan/eucastanpay/common/proto/audit";

import "google/protobuf/timestamp.proto";

service AuditService {
  rpc SearchAudit (SearchRequest) returns (SearchResponse);
  rpc GetAllAudits (AuditRequest) returns (GetAllAuditResponse);
  rpc GetAuditByID (GetByIDRequest) returns (AuditEntryResponse);
}

message SearchRequest {
  string correlation_id = 1;
  string reference       = 2;
  string event_type      = 3;
  int64  min_amount      = 4;
  int64  max_amount      = 5;
  int64  from_date       = 6;
  int64  to_date         = 7;
  int32  limit           = 8;
  int32  offset          = 9;
}

message SearchResponse {
  repeated AuditEntryResponse entries = 1;
  int32 total_count           = 2;
}

message AuditRequest {
  int32 page = 1;
  int32 limit = 2;
}

message GetAllAuditResponse {
  repeated AuditEntryResponse data = 1;
}

message GetByIDRequest {
  string audit_id = 1;
}

message AuditEntryResponse {
  string audit_id        = 1;
  string event_type      = 2;
  string service         = 3;
  string correlation_id  = 4;
  string causation_id = 5;
  string reference       = 6;
  string account_id      = 7;
  string user_id         = 8;
  int64  amount          = 9;
  string status          = 10;
  string payload    = 11;   
  google.protobuf.Timestamp created_at = 12;
}